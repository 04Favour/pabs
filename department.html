<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Department - Faculty of Communication and Media Studies</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="images/uniuyo-logo.png" alt="University of Uyo logo">
  <div class="header-text">
    <h1>Faculty of Communication and Media Studies</h1>
    <p>University of Uyo &mdash; "Communicate or Perish"</p>
  </div>
  <img src="images/ims-logo.jpg" alt="Information and Media Studies department logo">
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="department.html">Department</a>
  <a href="gender.html">Gender</a>
  <a href="contact.html">Contact</a>
</nav>

<main>

  <h2>Departments</h2>

  <section>
    <form id="deptForm">
      <label for="deptSelect">Select a Department:</label>
      <select id="deptSelect" name="department" onchange="showHOD()" required>
        <option value="">-- Choose a Department --</option>
        <option value="Mass Communication|Dr. Iniobong Courage Nda|">Mass Communication</option>
        <option value="Information and Media Studies|Herbert E. Batta|Nigerian People and Culture, History of the Nigerian Mass Media, Basic Computer Tools and Programme Packages, Computer Aided Design in Media Production, Web-based Techniques and Multimedia, Information Technology and Media Sociology, Government and Politics in the Information Age, Fundamentals of Information and Media Finance">Information and Media Studies</option>
        <option value="Advertising and Marketing Communication|Prof. Aniebo C. Samson|">Advertising and Marketing Communication</option>
        <option value="Journalism|Dr. Nsikak S. Idiong|">Journalism</option>
        <option value="Public Relations|Dr. Uduot A. Iwok|">Public Relations</option>
        <option value="Strategic and Corporate Communication|Prof. Nsikan Senam|">Strategic and Corporate Communication</option>
        <option value="Development Communication|Prof. Ashong Ashong|">Development Communication</option>
        <option value="Broadcasting|Prof. Uwem Udo Akpan|">Broadcasting</option>
        <option value="Film and Multimedia Studies|Prof. Charles Obot|">Film and Multimedia Studies</option>
      </select>

      <div id="deptResult"></div>

      <button type="submit">Submit</button>
    </form>
    <p id="saveNote" style="display:none; margin-top:15px; color:#7a0d13; font-weight:bold;">
      Saved!
    </p>
  </section>

</main>

<footer>
  <p>&copy; 2026 Faculty of Communication and Media Studies, University of Uyo</p>
</footer>

<script src="submissions.js"></script>
<script>
  function showHOD() {
    var select = document.getElementById("deptSelect");
    var result = document.getElementById("deptResult");
    var value = select.value;

    if (value === "") {
      result.style.display = "none";
      return;
    }

    var parts = value.split("|");
    var html = "<p>Head of Department (" + parts[0] + "): " + parts[1] + "</p>";

    if (parts[2]) {
      var courses = parts[2].split(", ");
      html += "<p style=\"margin-top:10px;\">Courses Offered:</p><ul>";
      for (var i = 0; i < courses.length; i++) {
        html += "<li>" + courses[i] + "</li>";
      }
      html += "</ul>";
    } else {
      html += "<p style=\"margin-top:10px;\">Course list not yet available for this department.</p>";
    }

    result.innerHTML = html;
    result.style.display = "block";
  }

  document.getElementById("deptForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var parts = document.getElementById("deptSelect").value.split("|");
    var data = {
      type: "department",
      department: parts[0],
      hod: parts[1],
      courses: parts[2] ? parts[2].split(", ") : [],
      submittedAt: new Date().toISOString()
    };
    downloadSubmission(data, "department").then(function () {
      document.getElementById("saveNote").style.display = "block";
    });
  });
</script>

</body>
</html>
